<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>角色與橋段投票</title>
  <meta property="og:title" content="會演是英雄2 全明星沈浸式教戰喜劇">
<meta property="og:description" content="會演是英雄2之《英雄所「賤」略同》">
<meta property="og:image" content="https://voting.heroaction.com.tw/images/topbar.jpg">
<meta property="og:url" content="https://voting.heroaction.com.tw/">
<meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #7c3aed;
      --blue: #2563eb;
      --cyan: #22d3ee;
      --sky: #38bdf8;
      --yellow: #fbbf24;
      --red: #ef4444;
      --ink: #1b2559;
      --muted: #7b86ab;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; overflow-x: hidden; }
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      color: var(--ink); font-size: 16px; min-height: 100vh;
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,0.28), rgba(255,255,255,0) 45%),
        repeating-conic-gradient(from 0deg at 50% 20%, rgba(255,255,255,0.07) 0deg 5deg, rgba(255,255,255,0) 5deg 11deg),
        linear-gradient(180deg, #8b5cf6 0%, #6366f1 28%, #2563eb 62%, #0ea5e9 100%);
      background-attachment: fixed;
    }

    .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 0 0 28px; }

    /* Hero banner */
    .banner { width: 100%; overflow: hidden; line-height: 0; }
    .banner img { width: 100%; height: 190px; object-fit: cover; object-position: center 46%; display: block; }

    /* Sticky slim bar */
    .topbar {
      position: sticky; top: 0; z-index: 100; width: 100%;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      color: white; padding: 10px 16px 0; text-align: center;
      box-shadow: 0 4px 14px rgba(30,40,120,0.35);
    }
    .topbar .step-info { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; padding-bottom: 10px; }
    .progress-bar { height: 6px; background: rgba(255,255,255,0.25); border-radius: 6px 6px 0 0; overflow: hidden; }
    .progress-fill { height: 6px; background: linear-gradient(90deg, var(--yellow), #f97316); transition: width 0.4s; box-shadow: 0 0 10px rgba(251,191,36,0.7); }

    .card {
      background: #ffffff; border-radius: 20px; padding: 18px; margin: 12px 12px;
      box-shadow: 0 8px 22px rgba(23,30,90,0.22); width: calc(100% - 24px);
      border: 2px solid rgba(255,255,255,0.6);
    }
    .card-title { font-family: 'Baloo 2','Noto Sans TC',sans-serif; font-size: 19px; font-weight: 800; color: var(--ink); }
    .card-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .options { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .option { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border: 2px solid #e6e9f5; border-radius: 14px; cursor: pointer; transition: all 0.15s; min-height: 54px; user-select: none; background: #fafbff; }
    .option:active { transform: scale(0.98); }
    .option.selected { border-color: var(--blue); background: linear-gradient(180deg, #eef4ff, #e0edff); box-shadow: 0 4px 12px rgba(37,99,235,0.22); }
    .option.disabled { opacity: 0.35; pointer-events: none; }
    .option-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #c4cbe4; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: #fff; }
    .option.selected .option-dot { border-color: var(--blue); background: var(--blue); }
    .option.selected .option-dot::after { content: ''; width: 9px; height: 9px; background: white; border-radius: 50%; }
    .option-text { font-size: 16px; font-weight: 700; }
    .option-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .bottom-bar { padding: 8px 12px 24px; display: flex; flex-direction: column; gap: 10px; width: calc(100% - 24px); margin: 0 12px; }
    .btn { width: 100%; padding: 18px; border: none; border-radius: 16px; font-family: 'Baloo 2','Noto Sans TC',sans-serif; font-size: 18px; font-weight: 800; cursor: pointer; transition: all 0.15s; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: linear-gradient(180deg, #fbbf24, #f97316); color: #4a2500; box-shadow: 0 6px 16px rgba(249,115,22,0.45); }
    .btn-primary:disabled { background: #c7cbe0; color: #fff; box-shadow: none; cursor: not-allowed; }
    .btn-back { background: rgba(255,255,255,0.9); color: var(--blue); font-size: 15px; font-weight: 700; padding: 13px; box-shadow: 0 3px 10px rgba(23,30,90,0.15); }

    .page { display: none; }
    .page.active { display: block; }

    .code-wrap { text-align: center; padding: 30px 18px; }
    .code-icon { font-size: 56px; margin-bottom: 14px; }
    .code-title { font-family: 'Baloo 2','Noto Sans TC',sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 8px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.25); }
    .code-desc { font-size: 14px; color: rgba(255,255,255,0.9); margin-bottom: 24px; }
    .code-input { width: 100%; padding: 18px; font-size: 30px; font-weight: 800; text-align: center; border: 3px solid rgba(255,255,255,0.8); border-radius: 16px; letter-spacing: 12px; outline: none; background: rgba(255,255,255,0.96); color: var(--ink); }
    .code-input:focus { border-color: var(--yellow); box-shadow: 0 0 0 4px rgba(251,191,36,0.35); }
    .code-error { color: #fff; background: var(--red); display: none; font-size: 14px; font-weight: 700; margin-top: 12px; padding: 8px 12px; border-radius: 10px; }

    .seat-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
    .seat-field label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; font-weight: 700; }
    .seat-field input { width: 100%; padding: 14px 12px; font-size: 17px; border: 2px solid #e6e9f5; border-radius: 12px; outline: none; background: #fafbff; }
    .seat-field input:focus { border-color: var(--blue); background: #fff; }
    .seat-hint { font-size: 12px; color: var(--muted); margin-top: 12px; text-align: center; }
    .seat-error { color: var(--red); font-size: 13px; font-weight: 700; margin-top: 8px; display: none; }

    .summary-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eef0f8; }
    .summary-item:last-child { border-bottom: none; }
    .summary-label { font-size: 15px; color: var(--muted); font-weight: 700; }
    .summary-value { font-size: 15px; font-weight: 700; color: var(--ink); text-align: right; max-width: 60%; }

    .success-wrap { text-align: center; padding: 70px 18px; }
    .success-icon { font-size: 78px; margin-bottom: 18px; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.25)); }
    .success-title { font-family: 'Baloo 2','Noto Sans TC',sans-serif; font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
    .success-desc { font-size: 15px; color: rgba(255,255,255,0.92); line-height: 1.7; }

    .loading { text-align: center; padding: 60px 16px; color: rgba(255,255,255,0.9); font-size: 15px; }

    /* Loading overlay */
    .loading-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: linear-gradient(180deg, #8b5cf6 0%, #6366f1 28%, #2563eb 62%, #0ea5e9 100%);
      flex-direction: column; align-items: center; justify-content: center;
    }
    .loading-overlay.active { display: flex; }
    .loading-logo {
      width: 120px; height: 120px; object-fit: contain;
      animation: logoPulse 1.4s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.35));
    }
    .loading-text {
      margin-top: 28px; color: #fff; font-family: 'Baloo 2','Noto Sans TC',sans-serif;
      font-size: 18px; font-weight: 800; letter-spacing: 2px;
      opacity: 0.9;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.1); opacity: 0.75; }
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="loading-overlay" id="loading-overlay">
    <img class="loading-logo" src="images/LINE Logo.png" alt="載入中">
    <div class="loading-text">送出中<span class="loading-dots"></span></div>
  </div>

  <div class="banner"><img src="images/topbar.jpg" alt="英雄所踐略同"></div>

  <div class="topbar">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="step-info" id="header-step">請輸入驗證碼</div>
  </div>

  <!-- Page 0：驗證碼 -->
  <div class="page active" id="page0">
    <div class="code-wrap">
      <div class="code-icon">🔐</div>
      <div class="code-title">請輸入驗證碼</div>
      <div class="code-desc">請輸入活動驗證碼以繼續投票</div>
      <input class="code-input" id="code-input" type="text" maxlength="6" placeholder="______" oninput="this.value=this.value.toUpperCase()">
      <div class="code-error" id="code-error">❌ 驗證碼錯誤，請重新輸入</div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-primary" onclick="verifyCode()">確認驗證 →</button>
    </div>
  </div>

  <!-- Page 1：座位 -->
  <div class="page" id="page1">
    <div class="card">
      <div class="card-title">📍 請填入座位資訊</div>
      <div class="card-sub">例如：1樓 / A區 3排 12號</div>
      <div class="seat-grid">
        <div class="seat-field"><label>樓層</label><input id="seat-floor" type="text" placeholder="例：1"></div>
        <div class="seat-field"><label>區域</label><input id="seat-area" type="text" placeholder="例：A"></div>
        <div class="seat-field"><label>排</label><input id="seat-row" type="number" placeholder="例：3"></div>
        <div class="seat-field"><label>號</label><input id="seat-num" type="number" placeholder="例：12"></div>
      </div>
      <div class="seat-error" id="seat-error">⚠️ 請填寫完整的座位資訊</div>
      <div class="seat-hint">格式：__樓 / __區 __排 __號</div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-primary" onclick="submitSeat()">下一步：選擇角色 →</button>
    </div>
  </div>

  <!-- Page 2：選角色 -->
  <div class="page" id="page2">
    <div id="step1-cards"></div>
    <div class="bottom-bar">
      <button class="btn btn-primary" id="btn2" onclick="goToStep3()" disabled>下一步：選擇橋段主演 →</button>
      <button class="btn btn-back" onclick="goBackTo1()">← 返回修改座位</button>
    </div>
  </div>

  <!-- Page 3：選橋段主演 -->
  <div class="page" id="page3">
    <div id="step2-cards"></div>
    <div class="bottom-bar">
      <button class="btn btn-primary" id="btn3" onclick="goToStep4()" disabled>下一步：確認投票 →</button>
      <button class="btn btn-back" onclick="goBackTo2()">← 返回修改角色選擇</button>
    </div>
  </div>

  <!-- Page 4：確認送出 -->
  <div class="page" id="page4">
    <div class="card">
      <div class="card-title">📍 座位資訊</div>
      <div id="summary-seat" style="margin-top:12px;"></div>
    </div>
    <div class="card">
      <div class="card-title">🎭 角色選擇</div>
      <div id="summary-roles" style="margin-top:12px;"></div>
    </div>
    <div class="card">
      <div class="card-title">🎬 橋段主演</div>
      <div id="summary-scenes" style="margin-top:12px;"></div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-primary" onclick="submitVote()">✅ 確認送出</button>
      <button class="btn btn-back" onclick="goBackTo3()">← 返回修改橋段主演</button>
    </div>
  </div>

  <!-- Page 5：完成 -->
  <div class="page" id="page5">
    <div class="success-wrap">
      <div class="success-icon">🎉</div>
      <div class="success-title">投票成功！</div>
      <div class="success-desc">感謝您的參與<br>您的投票已成功送出</div>
    </div>
  </div>

</div>

<script>
  var API_URL = 'https://script.google.com/macros/s/AKfycbwqElVFZOm9Ps6AjSc2A7bwNzAhDWrDwRNbZb9sbeaoryhJFiR6dEtrVSJmowIQ48So/exec';

  var config = {};
  var roleChoices = {};
  var sceneChoices = {};
  var seatInfo = {};

  var stepTitles = ['請輸入驗證碼', '填寫座位資訊', '第一階段：選擇角色', '第二階段：橋段主演', '確認您的投票', '投票完成'];
  var stepProgress = [0, 20, 40, 65, 85, 100];

  fetch(API_URL + '?action=getConfig')
    .then(function(r) { return r.json(); })
    .then(function(data) { if (data && data.actors) config = data; });

  function updateHeader(step) {
    document.getElementById('header-step').textContent = stepTitles[step];
    document.getElementById('progress').style.width = stepProgress[step] + '%';
  }

  // =====================
  // Page 0：驗證碼
  // =====================
  function verifyCode() {
    var code = document.getElementById('code-input').value.trim();
    var errorEl = document.getElementById('code-error');

    if (code === '1234') {
      errorEl.style.display = 'none';
      showPage('page1');
      updateHeader(1);
      return;
    }

    fetch(API_URL + '?action=verifyCode&code=' + encodeURIComponent(code))
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (result.success) {
          errorEl.style.display = 'none';
          showPage('page1');
          updateHeader(1);
        } else {
          errorEl.style.display = 'block';
          document.getElementById('code-input').value = '';
        }
      });
  }

  document.getElementById('code-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') verifyCode();
  });

  // =====================
  // Page 1：座位
  // =====================
  function submitSeat() {
    var floor = document.getElementById('seat-floor').value.trim();
    var area = document.getElementById('seat-area').value.trim();
    var row = document.getElementById('seat-row').value.trim();
    var num = document.getElementById('seat-num').value.trim();
    var errorEl = document.getElementById('seat-error');
    if (!floor || !area || !row || !num) {
      errorEl.style.display = 'block';
      return;
    }
    errorEl.style.display = 'none';
    seatInfo = { floor: floor, area: area, row: row, num: num };
    showPage('page2');
    updateHeader(2);
    renderStep1();
  }

  // =====================
  // Page 2：選角色
  // =====================
  function renderStep1() {
    var container = document.getElementById('step1-cards');
    container.innerHTML = '';
    config.actors.forEach(function(actor) {
      var card = document.createElement('div');
      card.className = 'card';
      var optionsHtml = '';
      config.roles.forEach(function(role) {
        optionsHtml += '<div class="option" id="opt-' + actor + '-' + role + '" onclick="selectRole(\'' + actor + '\', \'' + role + '\')">' +
          '<div class="option-dot"></div>' +
          '<div class="option-text">' + role + '</div></div>';
      });
      card.innerHTML = '<div class="card-title">' + actor + '</div>' +
        '<div class="card-sub">請選擇角色（再點一次可取消）</div>' +
        '<div class="options">' + optionsHtml + '</div>';
      container.appendChild(card);
    });
  }

  function selectRole(actor, role) {
    if (roleChoices[actor] === role) {
      delete roleChoices[actor];
      refreshRoleUI();
      checkStep1Complete();
      return;
    }
    var takenBy = null;
    Object.keys(roleChoices).forEach(function(a) {
      if (roleChoices[a] === role && a !== actor) takenBy = a;
    });
    if (takenBy) {
      alert('「' + role + '」已被 ' + takenBy + ' 選擇，請選其他角色');
      return;
    }
    roleChoices[actor] = role;
    refreshRoleUI();
    checkStep1Complete();
  }

  function refreshRoleUI() {
    var takenRoles = Object.values(roleChoices);
    config.actors.forEach(function(actor) {
      config.roles.forEach(function(role) {
        var el = document.getElementById('opt-' + actor + '-' + role);
        if (!el) return;
        el.classList.remove('selected', 'disabled');
        if (roleChoices[actor] === role) {
          el.classList.add('selected');
        } else if (takenRoles.indexOf(role) !== -1) {
          el.classList.add('disabled');
        }
      });
    });
  }

  function checkStep1Complete() {
    var complete = config.actors.every(function(a) { return roleChoices[a]; });
    document.getElementById('btn2').disabled = !complete;
  }

  function goToStep3() {
    showPage('page3');
    updateHeader(3);
    renderStep2();
  }

  function goBackTo1() {
    showPage('page1');
    updateHeader(1);
  }

  // =====================
  // Page 3：選橋段主演
  // =====================
  function renderStep2() {
    var container = document.getElementById('step2-cards');
    container.innerHTML = '';
    config.scenes.forEach(function(scene) {
      var card = document.createElement('div');
      card.className = 'card';
      var optionsHtml = '';
      config.actors.forEach(function(actor) {
        optionsHtml += '<div class="option" id="sopt-' + scene + '-' + actor + '" onclick="selectScene(\'' + scene + '\', \'' + actor + '\')">' +
          '<div class="option-dot"></div>' +
          '<div><div class="option-text">' + (roleChoices[actor] || actor) + '</div>' +
          '<div class="option-sub">由 ' + actor + ' 飾演</div></div></div>';
      });
      card.innerHTML = '<div class="card-title">橋段「' + scene + '」</div>' +
        '<div class="card-sub">請選擇主演（再點一次可取消）</div>' +
        '<div class="options">' + optionsHtml + '</div>';
      container.appendChild(card);
    });
    refreshSceneUI();
  }

  function selectScene(scene, actor) {
    if (sceneChoices[scene] === actor) {
      delete sceneChoices[scene];
      refreshSceneUI();
      checkStep2Complete();
      return;
    }
    var takenBy = null;
    Object.keys(sceneChoices).forEach(function(s) {
      if (sceneChoices[s] === actor && s !== scene) takenBy = s;
    });
    if (takenBy) {
      alert('「' + actor + '」已在橋段「' + takenBy + '」主演，請選其他演員');
      return;
    }
    sceneChoices[scene] = actor;
    refreshSceneUI();
    checkStep2Complete();
  }

  function refreshSceneUI() {
    var takenActors = Object.values(sceneChoices);
    config.scenes.forEach(function(scene) {
      config.actors.forEach(function(actor) {
        var el = document.getElementById('sopt-' + scene + '-' + actor);
        if (!el) return;
        el.classList.remove('selected', 'disabled');
        if (sceneChoices[scene] === actor) {
          el.classList.add('selected');
        } else if (takenActors.indexOf(actor) !== -1) {
          el.classList.add('disabled');
        }
      });
    });
  }

  function checkStep2Complete() {
    var complete = config.scenes.every(function(s) { return sceneChoices[s]; });
    document.getElementById('btn3').disabled = !complete;
  }

  function goToStep4() {
    showPage('page4');
    updateHeader(4);
    document.getElementById('summary-seat').innerHTML =
      '<div class="summary-item"><span class="summary-label">座位</span>' +
      '<span class="summary-value">' + seatInfo.floor + '樓 / ' + seatInfo.area + '區 ' + seatInfo.row + '排 ' + seatInfo.num + '號</span></div>';
    document.getElementById('summary-roles').innerHTML = config.actors.map(function(actor) {
      return '<div class="summary-item"><span class="summary-label">' + actor + '</span><span class="summary-value">飾 ' + roleChoices[actor] + '</span></div>';
    }).join('');
    document.getElementById('summary-scenes').innerHTML = config.scenes.map(function(scene) {
      var actor = sceneChoices[scene];
      return '<div class="summary-item"><span class="summary-label">' + scene + '</span><span class="summary-value">' + (roleChoices[actor] || actor) + '<br><span style="font-size:12px;color:#8e8e93;">由 ' + actor + ' 飾演</span></span></div>';
    }).join('');
  }

  function goBackTo2() {
    showPage('page2');
    updateHeader(2);
  }

  function goBackTo3() {
    showPage('page3');
    updateHeader(3);
    renderStep2();
  }

  // =====================
  // 送出
  // =====================
  function buildScenePayload() {
    var result = {};
    Object.keys(sceneChoices).forEach(function(scene) {
      var actor = sceneChoices[scene];
      result[scene] = roleChoices[actor] || actor;
    });
    return result;
  }

  function submitVote() {
    document.getElementById('loading-overlay').classList.add('active');
    fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ roles: roleChoices, scenes: buildScenePayload(), seat: seatInfo })
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      document.getElementById('loading-overlay').classList.remove('active');
      if (result.success) {
        showPage('page5');
        updateHeader(5);
      } else {
        alert('送出失敗，請再試一次');
      }
    })
    .catch(function() {
      document.getElementById('loading-overlay').classList.remove('active');
      alert('網路錯誤，請再試一次');
    });
  }

  // =====================
  // 工具
  // =====================
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById(pageId).classList.add('active');
    window.scrollTo(0, 0);
  }
</script>
</body>
